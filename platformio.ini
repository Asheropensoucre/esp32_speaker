[env:esp32dev]
platform = espressif32
board = esp32dev
board_build.partitions = huge_app.csv
framework = arduino
monitor_speed = 115200

; Optimization flags to reduce flash usage
build_flags =
    -Os
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    -DCORE_DEBUG_LEVEL=0
    -DBT_SPP_ENABLED=0
    -DBLE_ENABLED=0
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DLOG_LOCAL_LEVEL=0
    -DARDUINO_EVENT_LOOP_STACK_SIZE=2048
    -D CGRAM_OFFSET=1
    ; TFT_eSPI configuration (replaces User_Setup.h)
    -D USER_SETUP_LOADED=1
    -D ST7789_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=240
    -D TFT_MOSI=21
    -D TFT_SCLK=23
    -D TFT_CS=33
    -D TFT_DC=22
    -D TFT_RST=-1
    -D TFT_MISO=-1
    -D LOAD_GLCD=1
    -D SPI_FREQUENCY=40000000

; Disable unused Arduino features to save space
build_unflags = -DARDUINO_USB_CDC_ON_BOOT

; Configure Bluetooth A2DP library to reduce size
lib_ignore =
    AudioTools

lib_deps =
    bodmer/TFT_eSPI@^2.5.31
    https://github.com/pschatzmann/ESP32-A2DP.git
